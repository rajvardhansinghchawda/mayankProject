version: "2"
type: frontend
tech_stack:
  - javascript
  - react
  - tailwindcss
  - vite
routes:
  - path: /
    file: src/pages/Login/index.jsx
    auth_required: false
    description: Institutional login page
  - path: /dashboard
    file: src/pages/Dashboard/index.jsx
    auth_required: true
    description: Student/Generic dashboard
  - path: /admin/dashboard
    file: src/pages/Admin/Dashboard/index.jsx
    auth_required: true
    description: Administration overview
  - path: /admin/moderation
    file: src/pages/Admin/Moderation/index.jsx
    auth_required: true
    description: Document approval queue
  - path: /admin/users/add
    file: src/pages/Admin/Users/AddUser.jsx
    auth_required: true
    description: Manual user creation
  - path: /admin/bulk-upload
    file: src/pages/Admin/Users/BulkUpload.jsx
    auth_required: true
    description: CSV bulk user import
  - path: /admin/create-test
    file: src/pages/AdminWizards/CreateTestWizard.jsx
    auth_required: true
    description: Multi-step test creation
features:
  - name: Admin Login
    description: Login with admin@mayankcollege.edu
    files:
      - src/pages/Login/index.jsx
      - src/context/AuthContext.jsx
    entry_route: /
    user_interactions:
      - Enter admin email
      - Enter password
      - Click Login
    api_calls:
      - method: POST
        endpoint: /api/auth/login/
    auth_required: false
  - name: Content Moderation
    description: Approve or reject student uploads
    files:
      - src/pages/Admin/Moderation/index.jsx
      - src/pages/Admin/Moderation/components/ModerationQueue.jsx
    entry_route: /admin/moderation
    user_interactions:
      - View pending documents
      - Click Approve button
    api_calls:
      - method: POST
        endpoint: /api/admin/documents/{id}/approve/
    auth_required: true
  - name: Bulk User Upload
    description: Import many users via CSV
    files:
      - src/pages/Admin/Users/BulkUpload.jsx
    entry_route: /admin/bulk-upload
    user_interactions:
      - Select CSV file
      - Click Upload
    api_calls:
      - method: POST
        endpoint: /api/admin/users/bulk-upload/
    auth_required: true
known_limitations: []
